      </div>
      {err && <div style={{padding:"6px 10px",background:"#FEE2E2",color:"#991B1B",fontSize:11,borderRadius:6,marginTop:10}}>{err}</div>}
      <div style={{marginTop:18,display:"flex",justifyContent:"flex-end",gap:8}}>
        <Btn onClick={onClose}>取消</Btn>
        <Btn v="primary" onClick={submit}>创建</Btn>
      </div>
    </div>
  </div>;
}


// ===== OPERATIONS PAGE (Issue #13 Day 4) =====
// 运营驾驶舱: 调用量 / 时延 / 错误率 / 维度排行
function OperationsPage({ back }) {
  const [hours, setHours] = useState(24);
  const [bucket, setBucket] = useState("hour");
  const [groupBy, setGroupBy] = useState("");
  const [summary, setSummary] = useState(null);
  const [series, setSeries] = useState([]);
  const [boards, setBoards] = useState({user_id:[],project_id:[]});
  const [loading, setLoading] = useState(false);
  const chartRef = useRef(null);
  const chartInst = useRef(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const qs = `hours=${hours}`;
      const [s, ts, lb_user, lb_proj] = await Promise.all([
        api(`/metrics/summary?${qs}`),
        api(`/metrics/timeseries?${qs}&bucket=${bucket}${groupBy?`&group_by=${groupBy}`:""}`),
        api(`/metrics/leaderboard?dim=user_id&metric=count&${qs}&top=10`),
        api(`/metrics/leaderboard?dim=project_id&metric=count&${qs}&top=10`),
      ]);
      setSummary(s);
      setSeries(ts?.series || []);
      setBoards({
        user_id: lb_user?.rows || [],
        project_id: lb_proj?.rows || [],
      });
    } finally { setLoading(false); }
  }, [hours, bucket, groupBy]);

  useEffect(() => { load(); }, [load]);

  // 渲染折线图
  useEffect(() => {
    if (!chartRef.current || !window.echarts) return;
    if (!chartInst.current) chartInst.current = window.echarts.init(chartRef.current);
    // 按 group 分组成多条线
    const grouped = {};
    series.forEach(p => {
      const k = p.group || "全部";
      if (!grouped[k]) grouped[k] = [];
      grouped[k].push([p.bucket, p.count]);
    });
    const allBuckets = Array.from(new Set(series.map(p => p.bucket))).sort();
    const lineSeries = Object.entries(grouped).map(([name, pts]) => ({
      name, type: "line", smooth: true, symbol: "circle", symbolSize: 4,
      data: allBuckets.map(b => {
        const hit = pts.find(p => p[0] === b);
        return hit ? hit[1] : 0;
      })
    }));
    chartInst.current.setOption({
      tooltip: { trigger: "axis" },
      legend: lineSeries.length > 1 ? { top: 0, type: "scroll" } : undefined,
      grid: { left: 50, right: 20, top: lineSeries.length > 1 ? 30 : 10, bottom: 30 },
      xAxis: { type: "category", data: allBuckets, axisLabel: { fontSize: 10 } },
      yAxis: { type: "value", name: "请求数", nameTextStyle: { fontSize: 10 } },
      series: lineSeries,
    }, true);
    chartInst.current.resize();
  }, [series]);

  useEffect(() => {
    const onResize = () => chartInst.current && chartInst.current.resize();
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  const SC = ({label, value, sub}) => (
    <div style={{flex:1,minWidth:140,padding:"14px 16px",background:"#fff",borderRadius:10,border:"1px solid "+C.bdrL}}>
      <div style={{fontSize:11,color:C.slateL,fontWeight:500}}>{label}</div>
      <div style={{fontSize:22,color:C.slate,fontWeight:700,marginTop:4,fontFamily:"var(--fn)"}}>{value}</div>
      {sub && <div style={{fontSize:10,color:C.slateL,marginTop:2}}>{sub}</div>}
    </div>
  );

  return <div>
    <Anim><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
      <div>
        <button onClick={back} style={{background:"none",border:"none",fontSize:11,color:C.slateL,cursor:"pointer",padding:0,marginBottom:4}}>← 返回</button>
        <div style={{fontSize:20,fontWeight:700,color:C.slate}}>运营驾驶舱</div>
        <div style={{fontSize:11,color:C.slateL}}>请求量 / 时延 / 错误率 / 维度排行</div>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <select value={hours} onChange={e=>setHours(parseInt(e.target.value))} style={{padding:"5px 10px",fontSize:11,borderRadius:6,border:"1px solid "+C.bdrL}}>
          <option value={1}>最近 1 小时</option>
          <option value={6}>最近 6 小时</option>
          <option value={24}>最近 24 小时</option>
          <option value={168}>最近 7 天</option>
          <option value={720}>最近 30 天</option>
        </select>
        <select value={bucket} onChange={e=>setBucket(e.target.value)} style={{padding:"5px 10px",fontSize:11,borderRadius:6,border:"1px solid "+C.bdrL}}>
          <option value="minute">分钟</option>
          <option value="hour">小时</option>
          <option value="day">天</option>
        </select>
        <select value={groupBy} onChange={e=>setGroupBy(e.target.value)} style={{padding:"5px 10px",fontSize:11,borderRadius:6,border:"1px solid "+C.bdrL}}>
          <option value="">不分组</option>
          <option value="model">按模型</option>
          <option value="project_id">按项目</option>
          <option value="endpoint">按端点</option>
          <option value="status">按状态码</option>
        </select>
        <Btn onClick={load}>{loading?"加载中...":"刷新"}</Btn>
      </div>
    </div></Anim>

    {/* summary cards */}
    <Anim delay={50}><div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:16}}>
      <SC label="总请求" value={summary?.total ?? "-"} sub={summary ? `${summary.unique_users} 用户 / ${summary.unique_projects} 项目` : ""}/>
      <SC label="平均时延" value={summary ? `${summary.avg_latency_ms} ms` : "-"} sub={summary ? `最大 ${summary.max_latency_ms} ms` : ""}/>
      <SC label="错误率" value={summary ? `${(summary.err_rate*100).toFixed(2)}%` : "-"} sub={summary ? `5xx ${summary.err_5xx} / 4xx ${summary.err_4xx}` : ""}/>
      <SC label="Token 总量" value={summary ? `${(summary.tokens_in+summary.tokens_out).toLocaleString()}` : "-"} sub={summary ? `in ${summary.tokens_in.toLocaleString()} / out ${summary.tokens_out.toLocaleString()}` : ""}/>
    </div></Anim>

    {/* timeseries */}
    <Anim delay={100}><div style={{padding:"16px 18px",background:"#fff",borderRadius:10,border:"1px solid "+C.bdrL,marginBottom:16}}>
      <div style={{fontSize:12,fontWeight:600,color:C.slate,marginBottom:8}}>请求量趋势</div>
      <div ref={chartRef} style={{width:"100%",height:300}}/>
    </div></Anim>

    {/* leaderboards */}
    <Anim delay={150}><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:12}}>
      <LB title="用户排行" rows={boards.user_id} unit="次"/>
      <LB title="项目排行" rows={boards.project_id} unit="次"/>
    </div></Anim>
  </div>;
}

function LB({title, rows, unit}) {
  // 优先显示 display_name (user → 姓名 / project → 项目名), fallback 到原 UUID/code (uuid 截短)
  const fmtValue = (r) => {
    if (r.display_name) return r.display_name;
    const v = r.value || "(空)";
    // UUID 长度 36, 截到前 8 字 + "…" 防超宽
    return v.length > 24 ? v.slice(0, 8) + "…" : v;
  };
  const fmtSub = (r) => r.display_email || (r.display_name && r.value !== r.display_name ? r.value.slice(0, 8) : "");

  return <div style={{padding:"14px 16px",background:"#fff",borderRadius:10,border:"1px solid "+C.bdrL}}>
    <div style={{fontSize:12,fontWeight:600,color:C.slate,marginBottom:10}}>{title}</div>
    {(!rows || rows.length===0) ? <div style={{fontSize:11,color:C.slateL,padding:"12px 0"}}>暂无数据</div> : <div>
      {rows.map((r, i) => (
        <div key={i} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"6px 0",borderBottom: i < rows.length-1 ? "1px solid #f3f4f6" : "none"}} title={r.value || ""}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:11,color:C.slate,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontWeight:r.display_name?500:400}}>{fmtValue(r)}</div>
            {fmtSub(r) && <div style={{fontSize:9,color:C.slateL,fontFamily:"var(--fn)",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fmtSub(r)}</div>}
          </div>
          <div style={{fontSize:11,color:C.slateL,fontFamily:"var(--fn)",marginLeft:8,whiteSpace:"nowrap"}}>{r.count} {unit}</div>
        </div>
      ))}
    </div>}
  </div>;
}

// ===== APP =====
// "我的 API 访问" 面板 (04-20 新增): 用户点 header 的 "API" 按钮弹出
// 解决 "怎么拿 user_id 调 API" 的反复问题, 一键复制 + 现成 curl 示例
// 敏感信息 (API key) 默认脱敏, 用户显式点"显示"才 reveal。
// curl 示例用 $NEXUS_API_KEY 占位, 复制走就不会把真 key 留在聊天记录/截图里。
function ApiPanel({ user, onClose }) {
  const [copied, setCopied] = useState("");
  const [showKey, setShowKey] = useState(false);
  const [showUid, setShowUid] = useState(false);
  const copy = (text, label) => {
    navigator.clipboard.writeText(text);
    setCopied(label);
    setTimeout(() => setCopied(""), 1500);
  };
  const firstProj = (user.projects && user.projects[0] && user.projects[0].id) || "ai-infra";
  const apiKey = "teleai-adapter-key-2026";
  const apiKeyMasked = apiKey.slice(0, 6) + "•".repeat(apiKey.length - 10) + apiKey.slice(-4);
  // user_id 默认也脱敏 (UUID 格式: 8-4-4-4-12, 只留前 8 位, 后面打码)
  const uidStr = (user.id || "");
  const uidMasked = uidStr.length > 8 ? uidStr.slice(0, 8) + "-••••-••••-••••-••••••••••••" : uidStr;
  const baseUrl = window.location.origin;
  // curl 示例用环境变量占位, 不把真 key 写进可复制文本, 复制给别人也没泄露
  const curlLetta = `# 先 export API key (仅一次, 不要发给别人):
#   export NEXUS_API_KEY='你从本面板复制的 API key'

curl -X POST ${baseUrl}/v1/chat/completions \\
  -H "Authorization: Bearer $NEXUS_API_KEY" \\
  -H "Content-Type: application/json" \\
  -d '{
    "model": "letta-${firstProj}",
    "messages": [{"role":"user","content":"你好"}],
    "user": "${user.id}",
    "stream": false
  }'`;
  const curlQwen = `# 先 export API key:
#   export NEXUS_API_KEY='你从本面板复制的 API key'

curl -X POST ${baseUrl}/v1/chat/completions \\
  -H "Authorization: Bearer $NEXUS_API_KEY" \\
  -H "Content-Type: application/json" \\
  -d '{
    "model": "qwen-no-mem",
    "messages": [{"role":"user","content":"你好"}],
    "stream": false
  }'`;
  const row = (label, value, key) => (
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5,height:18}}>
        <div style={{fontSize:10,color:C.sand,fontWeight:700,letterSpacing:1,fontFamily:"var(--fn)"}}>{label}</div>
        <span style={{fontSize:10,padding:"2px 6px",fontWeight:600,opacity:0}}>&nbsp;</span>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"stretch"}}>
        <code style={{flex:1,padding:"9px 12px",background:"#f3f4f6",borderRadius:8,fontSize:12,fontFamily:"var(--fn)",userSelect:"all",wordBreak:"break-all",lineHeight:1.5}}>{value}</code>
        <Btn onClick={()=>copy(value,key)} v="primary" style={{whiteSpace:"nowrap"}}>{copied===key?"已复制 ✓":"复制"}</Btn>
      </div>
    </div>
  );
  // 敏感行工厂: 默认脱敏, 点"显示"才 reveal; 复制始终复制真值
  const secretRow = (label, realValue, maskedValue, shown, toggle, copyKey, tag) => (
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5,height:18}}>
        <div style={{fontSize:10,color:C.sand,fontWeight:700,letterSpacing:1,fontFamily:"var(--fn)"}}>{label} {tag && <span style={{color:C.terra,fontWeight:600,marginLeft:4}}>{tag}</span>}</div>
        <button onClick={toggle} style={{border:"none",background:"transparent",cursor:"pointer",fontSize:10,color:C.slateL,padding:"2px 6px",fontWeight:600}}>{shown?"隐藏":"显示"}</button>
      </div>
      <div style={{display:"flex",gap:8,alignItems:"stretch"}}>
        <code style={{flex:1,padding:"9px 12px",background:"#f3f4f6",borderRadius:8,fontSize:12,fontFamily:"var(--fn)",userSelect:shown?"all":"none",wordBreak:"break-all",lineHeight:1.5,color:shown?C.slate:C.sand}}>
          {shown ? realValue : maskedValue}
        </code>
        <Btn onClick={()=>copy(realValue,copyKey)} v="primary" style={{whiteSpace:"nowrap"}}>{copied===copyKey?"已复制 ✓":"复制"}</Btn>
      </div>
    </div>
  );
  const keyRow = secretRow("API KEY", apiKey, apiKeyMasked, showKey, ()=>setShowKey(!showKey), "key", "(敏感, 勿外传)");
  const uidRow = secretRow("MY USER ID", uidStr, uidMasked, showUid, ()=>setShowUid(!showUid), "id", "(个人标识, 不建议截屏分享)");
  const codeBlock = (label, code, key) => (
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
        <div style={{fontSize:10,color:C.sand,fontWeight:700,letterSpacing:1,fontFamily:"var(--fn)"}}>{label}</div>
        <Btn onClick={()=>copy(code,key)} v="default" style={{fontSize:10,padding:"3px 10px"}}>{copied===key?"已复制 ✓":"复制"}</Btn>
      </div>
      <pre style={{padding:"10px 12px",background:"#f3f4f6",borderRadius:8,fontSize:11,fontFamily:"var(--fn)",overflowX:"auto",margin:0,whiteSpace:"pre",userSelect:"all",lineHeight:1.5,color:C.slate}}>{code}</pre>
    </div>
  );
  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(17,24,39,0.45)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:"22px 26px",maxWidth:760,width:"100%",maxHeight:"88vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18,borderBottom:`1px solid ${C.bdrL}`,paddingBottom:12}}>
          <div>
            <div style={{fontSize:16,fontWeight:700,color:C.slate}}>🔑 我的 API 访问</div>
            <div style={{fontSize:11,color:C.sand,marginTop:2}}>直接 copy 使用, 无需登录拿 JWT</div>
          </div>
          <button onClick={onClose} style={{border:"none",background:"none",cursor:"pointer",color:C.sand,fontSize:22,padding:0,width:28,height:28}}>×</button>
        </div>
        {uidRow}
        {keyRow}
        {row("BASE URL", baseUrl, "url")}
        <div style={{height:1,background:C.bdrL,margin:"18px 0 14px"}}/>
        {codeBlock(`CURL 示例 · letta-${firstProj} (有记忆, 需 user_id)`, curlLetta, "curl-letta")}
        {codeBlock("CURL 示例 · qwen-no-mem (无记忆, 无需 user_id)", curlQwen, "curl-qwen")}
        <div style={{marginTop:14,padding:"10px 12px",background:"#fef2f2",borderRadius:8,fontSize:11,color:"#991b1b",lineHeight:1.7,border:"1px solid #fecaca"}}>
          <b>⚠️ 安全提示</b>：API key 是组织共享密钥，任何拿到它的人都能以"adapter 身份"调接口。<b>不要发聊天/截图/文档/Git 仓库</b>。curl 示例里已用 <code>$NEXUS_API_KEY</code> 占位，你 export 一次即可，分享命令时不会带上真 key。
        </div>
      </div>
    </div>
  );
}

function App() {
  const [page, setPage] = useState("home");
  const [arg, setArg] = useState(null);
  const [user, setUser] = useState(null);
  const [projects, setProjects] = useState([]);
  const [loading, setLoading] = useState(true);
  const [showApi, setShowApi] = useState(false);

  const go = (p, a = null) => { setPage(p); setArg(a); if(p==="home") loadData(); };

  const loadData = () => {
    Promise.all([api("/me"), api("/projects")]).then(([me, ps]) => {
      if(me) setUser(me);
      if(ps) setProjects(ps);
      setLoading(false);
    }).catch(() => {
      setLoading(false);
      window.location.href = "/";
    });
  };

  useEffect(() => { loadData(); }, []);

  if (loading) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",color:C.sand,fontSize:14}}>加载中...</div>;
  if (!user) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",color:C.terra,fontSize:14}}>请先在 Open WebUI 登录后再访问此页面</div>;

  return (
    <div style={{"--ft":"'DM Sans', sans-serif","--fn":"'JetBrains Mono', monospace",fontFamily:"var(--ft)"}}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
      <style>{`* { box-sizing: border-box; margin: 0; } textarea:focus { border-color: #9ca3af !important; } input:focus { border-color: #9ca3af !important; } button:hover { filter: brightness(0.95); } button:active { transform: scale(0.98); } ::selection { background: #dbeafe; }`}</style>
      <div style={{background:C.bg,padding:"clamp(16px,3vw,36px) clamp(14px,4vw,48px) 40px",position:"relative",overflow:"hidden",width:"100%",margin:"0 auto",minHeight:"100vh",boxSizing:"border-box"}}>
        <Anim><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:28,flexWrap:"wrap",gap:10,borderBottom:"1px solid #e5e7eb",paddingBottom:16}}>
          <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>go("home")}><div style={{width:28,height:28,borderRadius:7,background:"#111827",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:12,fontWeight:700}}>T</div><div><div style={{fontSize:14,fontWeight:700,color:"#111827"}}>TeleAI Nexus</div><div style={{fontSize:10,color:"#9ca3af",fontWeight:500}}>知识管理</div></div></div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            {user.is_org_admin ? <Btn onClick={()=>go("org")} style={{fontSize:11,padding:"5px 12px"}}>中国电信人工智能研究院</Btn> : <span style={{fontSize:11,padding:"5px 12px",background:C.warmBg,borderRadius:8,color:C.slateL}}>中国电信人工智能研究院</span>}
            {user.is_org_admin && <Btn onClick={()=>go("ops")} style={{fontSize:11,padding:"5px 12px"}}>📊 运营</Btn>}
            {user.is_org_admin && <Btn onClick={()=>go("orgtree")} style={{fontSize:11,padding:"5px 12px"}}>🌳 组织</Btn>}
            <Btn onClick={()=>setShowApi(true)} style={{fontSize:11,padding:"5px 12px"}}>🔑 API</Btn>
            <Av name={user.name||"?"} size={26}/>
            <span style={{fontSize:12,color:"#4b5563",fontWeight:500}}>{user.name||user.email}</span>
            <a href="/" style={{fontSize:11,color:"#059669",textDecoration:"none",fontWeight:600}}>← 返回聊天</a>
          </div>
        </div></Anim>
        {showApi && <ApiPanel user={user} onClose={()=>setShowApi(false)}/>}
        {page === "home" && <Home go={go} user={user} projects={projects}/>}
        {page === "org" && <OrgPage back={()=>go("home")} user={user}/>}
        {page === "project" && <ProjPage pid={typeof arg==="string"?arg:arg?.pid} initialTab={typeof arg==="string"?null:arg?.tab} back={()=>go("home")} user={user}/>}
        {page === "memory" && <MemoryPage back={()=>go("home")}/>}
        {page === "personal" && <PersonalPage back={()=>go("home")}/>}
        {page === "new-project" && <NewProjectPage back={()=>go("home")} go={go}/>}
        {page === "ops" && <OperationsPage back={()=>go("home")}/>}
        {page === "orgtree" && <OrgPage_Admin back={()=>go("home")}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
