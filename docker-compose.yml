services:
  # Nginx — 统一入口
  nginx:
    image: nginx:alpine
    container_name: teleai-nginx
    ports:
      - "9800:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - adapter
    restart: unless-stopped

  # 适配层
  adapter:
    build: .
    container_name: teleai-adapter
    expose:
      - "8000"
    volumes:
      - adapter_data:/data/serving/adapter
      - open-webui-data:/data/open-webui:rw
    env_file: .env
    environment:
      - LETTA_BASE_URL=http://letta-server:8283
      - ORG_ADMIN_EMAILS=wuxn5@chinatelecom.cn,wengqzh@chinatelecom.cn
      - DEFAULT_FOLDER_QUOTA_MB=1024
      - DB_PATH=/data/serving/adapter/adapter.db
      - WEBUI_DB_PATH=/data/open-webui/webui.db
    depends_on:
      - letta-server
    restart: unless-stopped

  # Letta Server
  letta-server:
    image: letta/letta:latest
    container_name: teleai-letta
    expose:
      - "8283"
    env_file: .env
    environment:
      - LETTA_PG_URI=postgresql://letta:${POSTGRES_PASSWORD}@letta-db:5432/letta
      - OLLAMA_BASE_URL=http://ollama:11434
      - LETTA_UVICORN_WORKERS=4
      # 让 Letta 进程内自定义工具能读到, 用于调 adapter /internal/* (L2 SQL tools)
      - ADAPTER_API_KEY=${ADAPTER_API_KEY}
    volumes:
      # TeleAI patch：core_memory_append 加行级去重，见 letta-patches/core_tool_executor.py
      - ./letta-patches/core_tool_executor.py:/app/letta/services/tool_executor/core_tool_executor.py:ro
      # TeleAI patch 2026-04-20: grep_files 在 file.content=None 时 skip (原 .encode() 直接 NoneType crash)
      - ./letta-patches/files_tool_executor.py:/app/letta/services/tool_executor/files_tool_executor.py:ro
      # TeleAI patch 2026-04-21: pre-step compact for overfull agents (summarizer 只反应式触发 bug)
      - ./letta-patches/letta_agent_v3.py:/app/letta/agents/letta_agent_v3.py:ro
    depends_on:
      - letta-db
    restart: unless-stopped

  # PostgreSQL (Letta 专用，端口 5433 避开 memoh 的 5432)
  letta-db:
    image: pgvector/pgvector:pg15
    container_name: teleai-postgres
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=letta
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=letta
    volumes:
      - letta_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  adapter_data:
  letta_pgdata:
  open-webui-data:
    external: true
