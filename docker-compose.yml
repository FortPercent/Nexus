services:
  # Nginx — 统一入口
  nginx:
    image: nginx:alpine
    container_name: teleai-nginx
    ports:
      - "9800:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - adapter
    restart: unless-stopped

  # 适配层
  adapter:
    build: .
    container_name: teleai-adapter
    expose:
      - "8000"
    volumes:
      - adapter_data:/data/serving/adapter
    env_file: .env
    environment:
      - LETTA_BASE_URL=http://letta-server:8283
      - ORG_ADMIN_EMAILS=wuxn5@chinatelecom.cn,wengqzh@chinatelecom.cn
      - DEFAULT_FOLDER_QUOTA_MB=1024
      - DB_PATH=/data/serving/adapter/adapter.db
      - OPENWEBUI_URL=http://<临港集群地址>:<端口>
    depends_on:
      - letta-server
    restart: unless-stopped

  # Letta Server
  letta-server:
    image: letta/letta:latest
    container_name: teleai-letta
    expose:
      - "8283"
    env_file: .env
    environment:
      - LETTA_PG_URI=postgresql://letta:${POSTGRES_PASSWORD}@letta-db:5432/letta
    depends_on:
      - letta-db
    restart: unless-stopped

  # PostgreSQL (Letta 专用，端口 5433 避开 memoh 的 5432)
  letta-db:
    image: pgvector/pgvector:pg15
    container_name: teleai-postgres
    expose:
      - "5432"
    environment:
      - POSTGRES_USER=letta
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=letta
    volumes:
      - letta_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  adapter_data:
  letta_pgdata:
