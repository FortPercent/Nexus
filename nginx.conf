server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    # 聊天界面 — Open WebUI（已跑在 host 的 :3000）
    location / {
        proxy_pass http://172.17.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Open WebUI 构造绝对 URL / redirect 时依赖这些；缺了会 fallback 到
        # 内部 3000 端口，导致用户看到跳转到 :3000
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # Phase 5c (2026-04-21): 拦 WebUI 原生 knowledge/add, mirror 到 adapter 做兜底 ingest.
    # 即使用户不走 Knowledge UI 弹窗 (从已有 collection 加文件 / API 调用), 也能进 kb 盘层.
    # mirror 是 fire-and-forget: adapter hook 成败不影响用户 WebUI 体验.
    location ~ ^/api/v1/knowledge/[^/]+/file/add$ {
        mirror /_adapter_webui_hook_knowledge_add;
        mirror_request_body on;
        proxy_pass http://172.17.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # mirror 内部目标, external GET 返 404 (internal directive)
    location = /_adapter_webui_hook_knowledge_add {
        internal;
        proxy_pass http://adapter:8000/internal/webui-hook/knowledge-add;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Content-Type $content_type;
        proxy_set_header Host $host;
    }

    # 知识管理页面 — 适配层
    location /knowledge {
        proxy_pass http://adapter:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 知识管理 API — 适配层
    location /admin/api {
        proxy_pass http://adapter:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 记忆治理 API (trace / conflict / decisions / protection)
    # decisions/infer 调 vLLM 抽决策, 同步等响应可能 5 分钟+, timeout 给足
    location /memory/v1 {
        proxy_pass http://adapter:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 30s;
    }

    # Defense in depth：/internal/* 是容器内 agent 工具回调用的，
    # 正常路径是 teleai-letta → teleai-adapter:8000 Docker 内网直连，不经 nginx。
    # 这里显式 deny，防止未来 / 改为通配反代时意外暴露。
    location /internal/ {
        deny all;
        return 404;
    }

    # 聊天 API — 适配层
    location /v1 {
        proxy_pass http://adapter:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        # 2026-04-20: 长回答 (1000+ token) 的流式输出偶见 TransferEncodingError,
        # 把 read/send timeout 从 300s → 600s, 给长对话更多余量
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 30s;
    }

    # Responses API (OpenAI v2) — 适配层
    location /v2 {
        proxy_pass http://adapter:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 30s;
    }
}
