server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    # 聊天界面 — Open WebUI（已跑在 host 的 :3000）
    location / {
        proxy_pass http://172.17.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Open WebUI 构造绝对 URL / redirect 时依赖这些；缺了会 fallback 到
        # 内部 3000 端口，导致用户看到跳转到 :3000
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # 知识管理页面 — 适配层
    location /knowledge {
        proxy_pass http://adapter:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 知识管理 API — 适配层
    location /admin/api {
        proxy_pass http://adapter:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Defense in depth：/internal/* 是容器内 agent 工具回调用的，
    # 正常路径是 teleai-letta → teleai-adapter:8000 Docker 内网直连，不经 nginx。
    # 这里显式 deny，防止未来 / 改为通配反代时意外暴露。
    location /internal/ {
        deny all;
        return 404;
    }

    # 聊天 API — 适配层
    location /v1 {
        proxy_pass http://adapter:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        # 2026-04-20: 长回答 (1000+ token) 的流式输出偶见 TransferEncodingError,
        # 把 read/send timeout 从 300s → 600s, 给长对话更多余量
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 30s;
    }

    # Responses API (OpenAI v2) — 适配层
    location /v2 {
        proxy_pass http://adapter:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 30s;
    }
}
