server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    # 聊天界面 — Open WebUI（已跑在 host 的 :3000）
    location / {
        proxy_pass http://172.17.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # 注入知识管理入口按钮（浮动在左下角）
        sub_filter '</body>' '
        <a href="/knowledge" id="kb-btn" style="
            position:fixed;bottom:20px;left:20px;z-index:9999;
            background:#b45309;color:#fff;text-decoration:none;
            padding:10px 16px;border-radius:12px;font-size:13px;font-weight:600;
            box-shadow:0 2px 8px rgba(0,0,0,0.15);transition:all 0.2s;
        " onmouseover="this.style.background=\'#92400e\'" onmouseout="this.style.background=\'#b45309\'">
            &#128218; 知识管理
        </a></body>';
        sub_filter_once on;
        sub_filter_types text/html;
        proxy_set_header Accept-Encoding "";
    }

    # 知识管理页面 — 适配层
    location /knowledge {
        proxy_pass http://adapter:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 知识管理 API — 适配层
    location /admin/api {
        proxy_pass http://adapter:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 聊天 API — 适配层
    location /v1 {
        proxy_pass http://adapter:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
